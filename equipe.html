<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HP INVEST | Mon Équipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .hp-blue { background: #007DBA; }
        .card-stats { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; }
        .tab-active { color: #007DBA; border-bottom: 3px solid #007DBA; font-weight: 900; }
    </style>
</head>
<body class="pb-32">

    <div class="hp-blue p-8 pt-12 pb-20 text-white rounded-b-[3rem] shadow-xl text-center relative">
        <h1 class="text-2xl font-black uppercase tracking-tighter italic">Centre de Réseau HP</h1>
        <p class="text-[9px] font-bold opacity-70 uppercase tracking-[0.3em] mt-1">Gérez vos partenaires d'investissement</p>
    </div>

    <div class="px-5 -mt-12 relative z-10">
        <div class="card-stats p-6 shadow-lg text-center">
            <p class="text-[10px] uppercase font-black text-slate-400 tracking-widest">Commission d'équipe totale</p>
            <h2 id="commTotal" class="text-3xl font-black text-slate-800 mt-2">0.00 <span class="text-sm font-light">CDF</span></h2>
            
            <div class="grid grid-cols-3 gap-2 mt-6">
                <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                    <p class="text-[8px] font-black text-blue-600 uppercase">LVL 1 (28%)</p>
                    <p id="l1_count" class="font-bold text-slate-700">0</p>
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl">
                    <p class="text-[8px] font-black text-slate-400 uppercase">LVL 2 (2%)</p>
                    <p id="l2_count" class="font-bold text-slate-700">0</p>
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl">
                    <p class="text-[8px] font-black text-slate-400 uppercase">LVL 3 (1%)</p>
                    <p id="l3_count" class="font-bold text-slate-700">0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="px-5 mt-6">
        <div class="bg-white p-5 rounded-3xl border border-dashed border-blue-300 flex items-center justify-between shadow-sm">
            <div>
                <p class="text-[9px] font-black text-slate-400 uppercase">Mon lien HP</p>
                <p id="refLink" class="text-[10px] font-bold text-blue-600 mt-1 italic">Chargement du lien...</p>
            </div>
            <button onclick="copyLink()" class="bg-slate-900 text-white p-3 rounded-xl active:scale-90 transition-all">
                <i class="fa-solid fa-copy"></i>
            </button>
        </div>
    </div>

    <div class="flex justify-around bg-white mt-8 border-b border-slate-100 px-5">
        <button id="btnL1" onclick="switchTab(1)" class="tab-active py-4 text-[10px] uppercase tracking-widest">Niveau 1</button>
        <button id="btnL2" onclick="switchTab(2)" class="py-4 text-[10px] uppercase tracking-widest text-slate-400">Niveau 2</button>
        <button id="btnL3" onclick="switchTab(3)" class="py-4 text-[10px] uppercase tracking-widest text-slate-400">Niveau 3</button>
    </div>

    <div id="teamList" class="px-5 mt-4 space-y-3">
        <div class="text-center py-10">
            <i class="fa-solid fa-users-slash text-4xl text-slate-200 mb-4"></i>
            <p class="text-[10px] font-bold text-slate-400 uppercase">Aucun membre détecté sur ce niveau</p>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 p-4 flex justify-around items-center z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-slate-300">
            <i class="fa-solid fa-house-laptop text-xl"></i><span class="text-[9px] font-bold mt-1 uppercase">Maison</span>
        </a>
        <a href="produit.html" class="flex flex-col items-center text-slate-300">
            <i class="fa-solid fa-microchip text-xl"></i><span class="text-[9px] font-bold mt-1 uppercase">Produit</span>
        </a>
        <a href="equipe.html" class="flex flex-col items-center text-[#007DBA]">
            <i class="fa-solid fa-users-gear text-xl"></i><span class="text-[9px] font-bold mt-1 uppercase">Équipe</span>
        </a>
        <a href="compte.html" class="flex flex-col items-center text-slate-300">
            <i class="fa-solid fa-circle-user text-xl"></i><span class="text-[9px] font-bold mt-1 uppercase">Le mien</span>
        </a>
    </nav>

    <script>
        const session = JSON.parse(localStorage.getItem('hp_session'));
        if(!session) window.location.href = "index.html";

        // Génération du lien de parrainage
        const myID = session.firebaseId; 
        const siteURL = window.location.origin;
        const fullRefLink = siteURL + "/register.html?ref=" + myID;
        document.getElementById('refLink').innerText = fullRefLink;

        function copyLink() {
            navigator.clipboard.writeText(fullRefLink);
            alert("✅ Lien HP copié ! Partagez-le pour gagner 28% de commission.");
        }

        function switchTab(lvl) {
            // Logique visuelle des onglets
            document.querySelectorAll('button[id^="btnL"]').forEach(btn => {
                btn.classList.remove('tab-active');
                btn.classList.add('text-slate-400');
            });
            document.getElementById('btnL' + lvl).classList.add('tab-active');
            document.getElementById('btnL' + lvl).classList.remove('text-slate-400');
            
            // Ici tu feras un fetch vers Firebase pour filtrer les utilisateurs où 'parrainID == myID'
        }
    </script>
</body>
</html>
