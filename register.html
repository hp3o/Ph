<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HP INVEST | Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: url('IMG_3838.jpeg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif;
        }
        .hp-overlay {
            background: rgba(0, 31, 63, 0.75); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 420px;
        }
        .input-hp { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            color: white; transition: 0.3s;
        }
        .input-hp:focus { border-color: #007DBA; background: rgba(0, 125, 186, 0.1); outline: none; }
        .btn-hp { background: #007DBA; color: white; transition: 0.3s; }
        .btn-hp:active { transform: scale(0.96); }
    </style>
</head>
<body class="p-6">

    <div class="hp-overlay p-8 rounded-[2.5rem] shadow-2xl text-center">
        <div class="mb-6">
            <div class="w-20 h-20 bg-white rounded-full mx-auto flex items-center justify-center mb-4 shadow-lg">
                <h1 class="text-4xl font-light text-[#007DBA] tracking-tighter">hp</h1>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight uppercase">HP INVEST</h2>
            <p class="text-[9px] uppercase tracking-[0.3em] text-blue-300 mt-1 font-black">Official Performance RDC</p>
        </div>

        <form id="hpRegForm" class="space-y-4 text-left">
            <div class="space-y-1">
                <label class="text-[10px] uppercase font-black text-blue-200/70 ml-1 tracking-widest">Numéro de téléphone</label>
                <div class="input-hp flex items-center px-4 rounded-2xl">
                    <span class="text-white font-bold mr-2 text-sm">+243</span>
                    <input type="tel" id="tel" placeholder="812345678" maxlength="9" class="bg-transparent py-4 text-sm w-full outline-none" required>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-3">
                <input type="password" id="p1" placeholder="Mot de passe" maxlength="8" class="input-hp px-5 py-4 rounded-2xl w-full text-sm" required>
                <input type="password" id="p2" placeholder="Confirmer mot de passe" maxlength="8" class="input-hp px-5 py-4 rounded-2xl w-full text-sm" required>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] uppercase font-black text-blue-200/70 ml-1 tracking-widest">Code de parrainage</label>
                <input type="text" id="inv" placeholder="Aucun code détecté" class="input-hp px-5 py-4 rounded-2xl w-full text-sm font-bold text-blue-300" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-hp w-full py-5 rounded-2xl font-black uppercase text-[11px] tracking-widest mt-4 shadow-xl">
                Créer mon compte HP
            </button>
        </form>

        <div class="mt-8 text-center text-white/40 text-[10px] font-bold uppercase tracking-wider">
            Membre HP ? <a href="index.html" class="text-blue-400 underline ml-1">Se connecter</a>
        </div>
    </div>

    <script>
        const dbURL = "https://ph-invest-f5bdf-default-rtdb.firebaseio.com";

        // --- 1. DETECTION AUTO DU PARRAIN ---
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                // On nettoie le code (enlève le + si présent)
                document.getElementById('inv').value = refCode.replace('+', '').trim();
            }
        };

        // --- 2. LOGIQUE D'INSCRIPTION ---
        document.getElementById('hpRegForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const rawPhone = document.getElementById('tel').value.trim();
            const phone = "+243" + rawPhone;
            const pass1 = document.getElementById('p1').value;
            const pass2 = document.getElementById('p2').value;
            const parrain = document.getElementById('inv').value.trim();
            const btn = document.getElementById('submitBtn');

            if(pass1 !== pass2) return alert("❌ Les mots de passe ne sont pas identiques !");
            if(pass1.length < 4) return alert("❌ Mot de passe trop court (min 4).");

            btn.innerText = "VÉRIFICATION HP...";
            btn.disabled = true;

            try {
                // Vérifier si le numéro existe déjà
                const checkRes = await fetch(`${dbURL}/utilisateurs.json`);
                const allUsers = await checkRes.json() || {};
                
                const exists = Object.values(allUsers).some(u => u.telephone === phone);
                if(exists) {
                    alert("❌ Ce numéro est déjà enregistré !");
                    btn.innerText = "CRÉER MON COMPTE HP";
                    btn.disabled = false;
                    return;
                }

                const userData = {
                    telephone: phone,
                    motDePasse: pass1,
                    parrain: parrain, // Pour tes commissions 28%
                    solde: 0,
                    revenuTotal: 0,
                    droitRetrait: false,
                    produitActif: false,
                    dateInscription: new Date().toISOString()
                };

                // Enregistrement avec un ID unique propre (on utilise le numéro sans le + comme clé)
                const userId = phone.replace('+', '');
                const response = await fetch(`${dbURL}/utilisateurs/${userId}.json`, {
                    method: 'PUT', // PUT crée un ID fixe, POST crée un ID bizarre (rouge)
                    body: JSON.stringify(userData)
                });

                if(response.ok) {
                    alert("✅ Bienvenue chez HP INVEST ! Connectez-vous.");
                    window.location.href = "index.html";
                } else {
                    throw new Error();
                }

            } catch (error) {
                alert("❌ Erreur serveur. Vérifiez votre connexion.");
                btn.innerText = "CRÉER MON COMPTE HP";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
