<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HP INVEST | Master Admin 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #0f172a; font-family: 'Segoe UI', sans-serif; color: white; }
        .admin-card { background: #1e293b; border: 1px solid #334155; border-radius: 1.5rem; transition: 0.3s; }
        .admin-card:hover { border-color: #3b82f6; }
        .btn-approve { @apply bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-green-900/20; }
        .btn-reject { @apply bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-red-900/20; }
        input { @apply bg-slate-800 border border-slate-700 rounded-xl p-3 text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="flex justify-between items-center mb-8 px-2">
        <div>
            <h1 class="text-xl font-black text-blue-400 uppercase tracking-tighter">HP ADMIN <span class="text-white">PRO</span></h1>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Contrôle Total du Réseau</p>
        </div>
        <button onclick="loadRequests()" class="bg-slate-800 p-3 rounded-2xl text-blue-400 active:rotate-180 transition-all">
            <i class="fa-solid fa-sync-alt"></i>
        </button>
    </div>

    <div class="admin-card p-6 mb-10 shadow-2xl">
        <h2 class="text-xs font-black uppercase mb-4 text-blue-300 flex items-center gap-2">
            <i class="fa-solid fa-coins"></i> Ajustement Rapide du Solde
        </h2>
        <div class="flex flex-col gap-3">
            <input type="tel" id="targetPhone" placeholder="Numéro du client (ex: 082...)">
            <input type="number" id="targetAmount" placeholder="Somme à AJOUTER (ex: 10000) ou RETIRER (-5000)">
            <button onclick="updateUserBalance()" id="btnUpdate" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black uppercase text-xs shadow-xl shadow-blue-900/40 transition-all">
                Appliquer la transaction
            </button>
        </div>
    </div>

    <div class="mb-10">
        <h2 class="text-[10px] font-black uppercase mb-4 px-2 text-amber-400 tracking-[0.2em] flex items-center gap-2">
            <i class="fa-solid fa-arrow-down"></i> Flux Entrants (Dépôts)
        </h2>
        <div id="rechargeList" class="space-y-4">
             <p class="text-center text-slate-600 text-[10px] italic">Vérification des serveurs...</p>
        </div>
    </div>

    <div class="mb-10">
        <h2 class="text-[10px] font-black uppercase mb-4 px-2 text-red-400 tracking-[0.2em] flex items-center gap-2">
            <i class="fa-solid fa-paper-plane"></i> Flux Sortants (Retraits)
        </h2>
        <div id="retraitList" class="space-y-4">
            <p class="text-center text-slate-600 text-[10px] italic">Vérification des paiements...</p>
        </div>
    </div>

    <script>
        const dbURL = "https://ph-invest-f5bdf-default-rtdb.firebaseio.com";

        // --- 1. AJUSTEMENT MANUEL ---
        async function updateUserBalance() {
            const phone = document.getElementById('targetPhone').value.trim();
            const amount = parseFloat(document.getElementById('targetAmount').value);
            const btn = document.getElementById('btnUpdate');

            if(!phone || isNaN(amount)) return alert("Veuillez remplir correctement les champs !");
            
            btn.disabled = true;
            btn.innerText = "Traitement...";

            try {
                const res = await fetch(`${dbURL}/utilisateurs.json`);
                const users = await res.json();
                
                // On cherche l'utilisateur par son numéro de téléphone
                let uId = null;
                for(let key in users) {
                    if(users[key].telephone && users[key].telephone.includes(phone)) {
                        uId = key;
                        break;
                    }
                }

                if(!uId) {
                    alert("❌ Client introuvable avec ce numéro !");
                } else {
                    const newSolde = (users[uId].solde || 0) + amount;
                    await fetch(`${dbURL}/utilisateurs/${uId}.json`, {
                        method: 'PATCH',
                        body: JSON.stringify({ solde: newSolde })
                    });
                    alert(`✅ Succès ! Nouveau solde de ${phone} : ${newSolde} FC`);
                    location.reload();
                }
            } catch (e) { alert("Erreur de connexion base de données"); }
            finally { btn.disabled = false; btn.innerText = "Appliquer la transaction"; }
        }

        // --- 2. CHARGEMENT DES FLUX ---
        async function loadRequests() {
            try {
                // Recharges
                const resRec = await fetch(`${dbURL}/demandesRecharge.json`);
                const dataRec = await resRec.json();
                const recContainer = document.getElementById('rechargeList');
                recContainer.innerHTML = "";

                let hasRec = false;
                for(let id in dataRec) {
                    const r = dataRec[id];
                    if(r.statut === "En attente") {
                        hasRec = true;
                        recContainer.innerHTML += `
                            <div class="admin-card p-5 flex justify-between items-center shadow-lg">
                                <div class="space-y-1">
                                    <p class="text-[11px] font-black text-white">${r.telephoneCompte}</p>
                                    <p class="text-sm text-emerald-400 font-black">${Number(r.montant).toLocaleString()} FC</p>
                                    <p class="text-[8px] text-slate-500 uppercase font-bold tracking-widest">${r.banqueCible} | ID: ${r.idTransaction || '---'}</p>
                                </div>
                                <div class="flex flex-col gap-2">
                                    <button onclick="actionRequest('demandesRecharge', '${id}', 'Validé', ${r.montant}, '${r.uid}')" class="btn-approve">Confirmer</button>
                                    <button onclick="actionRequest('demandesRecharge', '${id}', 'Rejeté')" class="btn-reject">Ignorer</button>
                                </div>
                            </div>`;
                    }
                }
                if(!hasRec) recContainer.innerHTML = "<p class='text-center text-slate-700 text-[10px]'>Aucun dépôt en attente.</p>";

                // Retraits
                const resRet = await fetch(`${dbURL}/demandesRetrait.json`);
                const dataRet = await resRet.json();
                const retContainer = document.getElementById('retraitList');
                retContainer.innerHTML = "";

                let hasRet = false;
                for(let id in dataRet) {
                    const r = dataRet[id];
                    if(r.statut === "En attente") {
                        hasRet = true;
                        retContainer.innerHTML += `
                            <div class="admin-card p-5 shadow-lg border-red-900/20">
                                <div class="flex justify-between items-start mb-3">
                                    <div>
                                        <p class="text-[11px] font-black text-blue-400">${r.numeroReception}</p>
                                        <p class="text-[9px] text-slate-400 uppercase font-bold">${r.nomSim || 'Inconnu'} (${r.reseau})</p>
                                    </div>
                                    <p class="text-sm font-black text-red-500">${Number(r.montantNet).toLocaleString()} FC</p>
                                </div>
                                <div class="grid grid-cols-2 gap-3 mt-4">
                                    <button onclick="actionRequest('demandesRetrait', '${id}', 'Validé')" class="btn-approve">Déjà Payé</button>
                                    <button onclick="actionRequest('demandesRetrait', '${id}', 'Rejeté', ${r.montantBrut}, '${r.uid}')" class="btn-reject font-bold">Rembourser</button>
                                </div>
                            </div>`;
                    }
                }
                if(!hasRet) retContainer.innerHTML = "<p class='text-center text-slate-700 text-[10px]'>Aucun paiement à effectuer.</p>";

            } catch (e) { console.error("Erreur de chargement des flux"); }
        }

        // --- 3. VALIDATION / REJET ---
        async function actionRequest(path, docId, newStatus, amount = 0, userUid = "") {
            if(!confirm(`Voulez-vous marquer cette demande comme ${newStatus} ?`)) return;

            try {
                // Mise à jour du statut
                await fetch(`${dbURL}/${path}/${docId}.json`, {
                    method: 'PATCH',
                    body: JSON.stringify({ statut: newStatus })
                });

                // Si c'est un dépôt OK ou un remboursement de retrait
                if((path === 'demandesRecharge' && newStatus === 'Validé') || (path === 'demandesRetrait' && newStatus === 'Rejeté')) {
                    // On récupère les données fraîches de l'utilisateur
                    const resU = await fetch(`${dbURL}/utilisateurs/${userUid}.json`);
                    const userData = await resU.json();
                    
                    if(userData) {
                        const payload = {
                            solde: (userData.solde || 0) + amount
                        };
                        
                        // Si c'est une recharge, on met aussi à jour le total rechargé pour les stats
                        if(path === 'demandesRecharge') {
                            payload.rechargeTotale = (userData.rechargeTotale || 0) + amount;
                        }

                        await fetch(`${dbURL}/utilisateurs/${userUid}.json`, {
                            method: 'PATCH',
                            body: JSON.stringify(payload)
                        });
                    }
                }

                alert("✅ Action enregistrée !");
                location.reload();
            } catch (e) { alert("Erreur lors de l'opération."); }
        }

        loadRequests();
    </script>
</body>
</html>
